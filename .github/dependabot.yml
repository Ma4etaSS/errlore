version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    # Library with loose pins — only security updates matter here.
    open-pull-requests-limit: 5
    groups:
      pip:
        patterns: ["*"]
