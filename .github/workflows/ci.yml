name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e .[dev]
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy
      - name: Tests
        run: pytest --cov=errlore --cov-fail-under=80

  # Dependency SCA: fail on known-vulnerable pins in the resolved environment.
  # Complements Dependabot (which only proposes bumps) with a hard gate.
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        # Upgrade pip first so pip-audit doesn't flag the runner's own
        # (potentially stale) pip instead of project dependencies.
        run: python -m pip install --upgrade pip && pip install -e . pip-audit
      - name: pip-audit
        run: pip-audit
