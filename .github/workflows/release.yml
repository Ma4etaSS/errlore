name: release

# Tag-driven release: push a v* tag -> full test gate -> build sdist+wheel ->
# publish to PyPI (API token from the PYPI_API_TOKEN repo secret) -> GitHub
# release with artifacts. skip-existing tolerates re-runs after a manual
# twine upload of the same version.
#
# Trusted publishing (OIDC) is the eventual upgrade — swap the password for
# permissions: id-token: write once the PyPI publisher config is verified.

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: mypy
      - run: pytest --cov=errlore --cov-fail-under=80

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      # Package validation before anything is uploaded anywhere.
      - run: python -m twine check --strict dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  github-release:
    # Depends on publish too: a GitHub release must never exist for a version
    # that failed to reach PyPI (release/registry consistency).
    needs: [build, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Create GitHub release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --notes "See CHANGELOG.md for details." || \
          gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
